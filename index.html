<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>INVESTOR TERMINAL v7 | Professional</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0e14; --side: #131722; --card: #1e222d; --accent: #2962ff; --text: #d1d4dc; --border: #2a2e39; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        aside { width: 220px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { padding: 20px; font-weight: 800; color: white; border-bottom: 1px solid var(--border); text-align: center; }
        nav { flex: 1; padding: 15px 10px; }
        nav li { padding: 12px 15px; margin-bottom: 5px; cursor: pointer; border-radius: 6px; list-style: none; color: #787b86; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        nav li:hover, nav li.active { background: var(--accent); color: white; }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { padding: 15px 25px; background: var(--side); border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; position: sticky; top: 0; z-index: 10; }
        input { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 4px; color: white; width: 150px; font-weight: bold; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; }
        .section { display: none; width: 100%; }
        .section.active { display: block; }
        
        .widget-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; height: 600px; }
        .label { padding: 10px 15px; background: rgba(255,255,255,0.03); font-size: 0.7rem; font-weight: bold; color: #787b86; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        
        .small-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .h-400 { height: 400px; }
    </style>
</head>
<body>

<aside>
    <div class="logo">PRO TERMINAL</div>
    <nav id="menu">
        <li class="active" data-section="overview"><i class="fas fa-chart-line"></i> Apžvalga</li>
        <li data-section="financials"><i class="fas fa-file-invoice-dollar"></i> Finansai (5 m.)</li>
        <li data-section="analysis"><i class="fas fa-microchip"></i> Vertinimas</li>
        <li data-section="news"><i class="fas fa-rss"></i> Naujienos</li>
    </nav>
</aside>

<main>
    <header>
        <input type="text" id="symbolInput" value="VNDA" placeholder="SIMBOLIS...">
        <button onclick="updateAll()">ANALIZUOTI</button>
        <div style="margin-left: auto; font-size: 0.8rem; color: #089981;"><i class="fas fa-circle"></i> RYŠYS AKTYVUS</div>
    </header>

    <div class="container">
        <div id="overview" class="section active">
            <div class="widget-box" style="height: 100px; border: none; background: transparent;">
                <div id="tv-mini"></div>
            </div>
            <div class="widget-box">
                <div class="label">Kainos grafikas</div>
                <div id="tv-chart" style="height: calc(100% - 35px);"></div>
            </div>
            <div class="widget-box h-400">
                <div class="label">Įmonės profilis</div>
                <div id="tv-profile" style="height: calc(100% - 35px);"></div>
            </div>
        </div>

        <div id="financials" class="section">
            <div class="widget-box" style="height: 700px;">
                <div class="label">Pajamų ir Pelno tendencijos (Paspauskite "Income Statement")</div>
                <div id="tv-fin" style="height: calc(100% - 35px);"></div>
            </div>
        </div>

        <div id="analysis" class="section">
            <div class="small-grid">
                <div class="widget-box h-400">
                    <div class="label">Techninis indikatorius</div>
                    <div id="tv-tech" style="height: calc(100% - 35px);"></div>
                </div>
                <div class="widget-box h-400">
                    <div class="label">Fundamentalūs duomenys</div>
                    <div id="tv-fund" style="height: calc(100% - 35px);"></div>
                </div>
            </div>
        </div>

        <div id="news" class="section">
            <div class="widget-box" style="height: 800px;">
                <div class="label">Naujausios rinkos naujienos</div>
                <div id="tv-news" style="height: calc(100% - 35px);"></div>
            </div>
        </div>
    </div>
</main>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Skyrių perjungimo logika
    document.querySelectorAll('#menu li').forEach(li => {
        li.addEventListener('click', function() {
            document.querySelectorAll('#menu li').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            
            this.classList.add('active');
            document.getElementById(this.dataset.section).classList.add('active');
            updateAll(); // Perkrauname grafikus, kad jie prisitaikytų prie naujo matomumo
        });
    });

    function updateAll() {
        const symbol = document.getElementById('symbolInput').value.toUpperCase();

        // 1. Pagrindinis grafikas
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Etc/UTC",
            "theme": "dark", "style": "1", "locale": "lt", "container_id": "tv-chart"
        });

        // 2. Viršutinė info juosta (Kaina, Market Cap)
        renderWidget("tv-mini", "symbol-info", { "symbol": symbol, "width": "100%", "locale": "lt" });

        // 3. Finansai (Čia yra tie 5 metų grafikai)
        renderWidget("tv-fin", "financials", { "symbol": symbol, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "lt" });

        // 4. Profilis
        renderWidget("tv-profile", "symbol-profile", { "symbol": symbol, "width": "100%", "height": "100%", "locale": "lt" });

        // 5. Techninė analizė
        renderWidget("tv-tech", "technical-analysis", { "symbol": symbol, "interval": "1D", "width": "100%", "height": "100%", "locale": "lt" });

        // 6. Fundamentalūs skaičiai
        renderWidget("tv-fund", "fundamental-data", { "symbol": symbol, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "lt" });

        // 7. Naujienos
        renderWidget("tv-news", "timeline", { "symbol": symbol, "width": "100%", "height": "100%", "locale": "lt" });
    }

    function renderWidget(containerId, type, config) {
        const container = document.getElementById(containerId);
        container.innerHTML = ""; // Išvalome seną
        const script = document.createElement('script');
        script.src = `https://s3.tradingview.com/external-embedding/embed-widget-${type}.js`;
        script.async = true;
        config.colorTheme = "dark";
        config.isTransparent = true;
        script.innerHTML = JSON.stringify(config);
        container.appendChild(script);
    }

    // Paleidžiame pirmą kartą
    window.onload = updateAll;
</script>
</body>
</html>
