<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTerminal | Real-Time</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0e17; --sidebar: #131722; --card: #1e222d; --accent: #2962ff; --text: #d1d4dc; --border: #363a45; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        aside { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .brand { padding: 25px; font-size: 1.4rem; font-weight: bold; color: white; border-bottom: 1px solid var(--border); }
        nav { flex: 1; padding: 20px 10px; }
        nav li { padding: 12px 15px; margin-bottom: 8px; cursor: pointer; border-radius: 6px; color: #787b86; display: flex; align-items: center; gap: 12px; }
        nav li.active { background: var(--accent); color: white; }
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { padding: 15px 30px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; position: sticky; top: 0; z-index: 10; }
        input { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 4px; color: white; width: 200px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .content { padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }
        .widget-container { width: 100%; height: 600px; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        .stats-bar { height: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>

<aside>
    <div class="brand">PRO-TERMINAL</div>
    <nav>
        <li class="active" onclick="showTab('tab1', this)"><i class="fas fa-chart-line"></i> Apžvalga</li>
        <li onclick="showTab('tab2', this)"><i class="fas fa-file-contract"></i> Finansai</li>
        <li onclick="showTab('tab3', this)"><i class="fas fa-balance-scale"></i> Vertinimas</li>
        <li onclick="showTab('tab4', this)"><i class="fas fa-newspaper"></i> Naujienos</li>
    </nav>
</aside>

<main>
    <header>
        <input type="text" id="ticker" value="VNDA" placeholder="Simbolis...">
        <button onclick="updateAll()">Analizuoti</button>
        <span id="price-info" style="margin-left: auto; font-weight: bold; color: #22c55e;"></span>
    </header>

    <div class="content">
        <div id="tab1" class="section active">
            <div class="widget-container" style="height: 120px; border: none; background: transparent;">
                <div id="tv-mini-info"></div>
            </div>
            <div class="widget-container" id="tv-main-chart"></div>
        </div>

        <div id="tab2" class="section">
            <div class="widget-container" id="tv-financials"></div>
        </div>

        <div id="tab3" class="section">
            <div class="widget-container" id="tv-technical"></div>
        </div>

        <div id="tab4" class="section">
            <div class="widget-container" id="tv-news"></div>
        </div>
    </div>
</main>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function updateAll() {
        const symbol = document.getElementById('ticker').value.toUpperCase();
        
        // 1. Pagrindinis grafikas
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Etc/UTC",
            "theme": "dark", "style": "1", "locale": "lt", "container_id": "tv-main-chart"
        });

        // 2. Mini Info Baras (Market Cap, P/E ir t.t. - TIKRI DUOMENYS)
        renderWidget("tv-mini-info", "symbol-info", { "symbol": symbol, "width": "100%", "locale": "lt" });

        // 3. Finansinės ataskaitos (Pajamos, Pelno nuostolio ataskaita)
        renderWidget("tv-financials", "fundamental-data", { "symbol": symbol, "displayMode": "regular", "width": "100%", "height": "100%" });

        // 4. Techninis vertinimas (Buy/Sell signalai)
        renderWidget("tv-technical", "technical-analysis", { "symbol": symbol, "interval": "1D", "width": "100%", "height": "100%" });

        // 5. Naujienos (Tikros to simbolio naujienos)
        renderWidget("tv-news", "timeline", { "symbol": symbol, "width": "100%", "height": "100%" });
    }

    function renderWidget(containerId, type, config) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        const script = document.createElement('script');
        script.src = `https://s3.tradingview.com/external-embedding/embed-widget-${type}.js`;
        script.type = 'text/javascript';
        script.async = true;
        config.colorTheme = "dark";
        config.isTransparent = true;
        script.innerHTML = JSON.stringify(config);
        container.appendChild(script);
    }

    window.onload = updateAll;
</script>
</body>
</html>
